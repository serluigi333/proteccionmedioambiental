<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }}</title>
  <style>
    /* --- ESTILOS GLOBALES (DARK MODE) --- */
    body {
      margin: 0;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      background-color: #0d1117; /* Azul oscuro profundo */
      color: #c9d1d9; /* Texto gris claro para lectura descansada */
    }

    /* --- ANIMACIÓN DEL MENÚ --- */
    @keyframes deslizarDerecha {
      0% { transform: translateX(-100%); opacity: 0; }
      100% { transform: translateX(0); opacity: 1; }
    }

    /* --- ESTILOS DEL MENÚ LATERAL (NAV) --- */
    nav {
      width: 280px;
      background: linear-gradient(180deg, #161b22 0%, #0d1117 100%);
      padding: 30px 20px;
      height: 100vh;
      position: fixed;
      overflow-y: auto;
      border-right: 1px solid #30363d;
      box-shadow: 10px 0 20px rgba(0,0,0,0.3);
      animation: deslizarDerecha 0.8s ease-out forwards;
      box-sizing: border-box;
      display: flex;
      flex-direction: column; 
    }

    nav h3 {
      color: #58a6ff; /* Azul brillante para el título */
      text-align: center;
      margin-top: 0;
      margin-bottom: 25px;
      font-size: 1.3em;
      border-bottom: 1px solid #30363d;
      padding-bottom: 15px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* Estilo base de los enlaces del menú */
    nav a {
      display: block;
      margin: 10px 0;
      padding: 12px 15px;
      text-decoration: none;
      font-weight: 600;
      border-radius: 6px;
      background-color: rgba(255, 255, 255, 0.03);
      transition: all 0.3s ease;
    }

    /* --- NUEVOS COLORES DE LOS AUTORES (Actualizados) --- */
    /* Sergio: Cian Eléctrico */
    .autor-sergio { color: #00f2ff; border-left: 4px solid #00f2ff; }
    /* Julio: Verde Neón */
    .autor-julio { color: #39ff14; border-left: 4px solid #39ff14; }
    /* Juan José: Amarillo Dorado */
    .autor-juanjose { color: #ffeb3b; border-left: 4px solid #ffeb3b; }
    /* Trabajo Conjunto: Blanco/Plata */
    .autor-general { color: #f0f6fc; border-left: 4px solid #f0f6fc; }

    /* Efecto al pasar el ratón (Hover) */
    nav a:hover {
      background-color: #30363d;
      transform: translateX(8px); 
      filter: brightness(1.2);
    }

    /* --- LEYENDA DE AUTORES --- */
    .leyenda {
      margin-top: auto; /* Empuja la leyenda al final del nav */
      padding-top: 20px;
      border-top: 1px solid #30363d;
    }

    .leyenda h4 {
      margin-bottom: 15px;
      color: #8b949e;
      font-size: 0.9em;
      text-transform: uppercase;
    }

    .autor-item {
      display: flex;
      align-items: center;
      margin-bottom: 10px;
      font-size: 0.85em;
      color: #8b949e;
    }

    .circulo {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      margin-right: 12px;
      flex-shrink: 0;
    }

    .bg-sergio { background-color: #00f2ff; box-shadow: 0 0 8px #00f2ff; }
    .bg-julio { background-color: #39ff14; box-shadow: 0 0 8px #39ff14; }
    .bg-juanjose { background-color: #ffeb3b; box-shadow: 0 0 8px #ffeb3b; }
    .bg-general { background-color: #f0f6fc; box-shadow: 0 0 8px #f0f6fc; }

    /* --- ESTILOS DEL CONTENIDO PRINCIPAL (MAIN) --- */
    main {
      margin-left: 280px;
      padding: 60px;
      width: 100%;
      max-width: 1000px;
      box-sizing: border-box;
      line-height: 1.6;
    }

    h1, h2, h3 { color: #58a6ff; }
    
    /* Estilo para tablas en modo oscuro */
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 20px 0;
      background-color: #161b22;
    }
    th, td {
      border: 1px solid #30363d;
      padding: 12px;
      text-align: left;
    }
    th { background-color: #21262d; }

    img {
      max-width: 100%;
      border: 1px solid #30363d;
      border-radius: 8px;
      margin: 20px 0;
    }

    blockquote {
      border-left: 4px solid #58a6ff;
      padding-left: 20px;
      color: #8b949e;
      font-style: italic;
      background: rgba(88, 166, 255, 0.05);
      margin: 20px 0;
      padding: 15px;
    }
  </style>
</head>
<body>

  <nav>
    <h3>Informática Ambiental</h3>
    
    <a href="index.html" class="autor-sergio">Inicio</a>
    <a href="contaminacion.html" class="autor-sergio">1. Contaminación</a>
    <a href="residuos.html" class="autor-julio">2. Residuos (e-Waste)</a>
    <a href="obsolescencia.html" class="autor-julio">3. Obsolescencia</a>
    <a href="ecologica.html" class="autor-juanjose">4. Informática Verde</a>
    <a href="referencias.html" class="autor-general">5. Créditos</a>

    <div class="leyenda">
      <h4>Asignación</h4>
      <div class="autor-item">
        <div class="circulo bg-sergio"></div>
        <span>Sergio</span>
      </div>
      <div class="autor-item">
        <div class="circulo bg-julio"></div>
        <span>Julio</span>
      </div>
      <div class="autor-item">
        <div class="circulo bg-juanjose"></div>
        <span>Juan José</span>
      </div>
      <div class="autor-item">
        <div class="circulo bg-general"></div>
        <span>Conjunto</span>
      </div>
    </div>
  </nav>

  <main>
    {{ content }}
  </main>

</body>
</html>
